<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">

  <title>25/05💜</title>

  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700&display=swap" rel="stylesheet">

  <style>

    body {
      background-color: blueviolet;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 40px;
      margin: 0;
    }

    h1 {
      font-family: 'Baloo 2', cursive;
      font-size: 70px;
      letter-spacing: 2px;
      display: inline-block;
      color: #ce0cec;

      text-shadow:
        2px 2px 0px #990988,
        -2px -2px 4px rgba(255,255,255,0.5),
        4px 4px 10px rgba(0,0,0,0.3);

      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.4));
    }

    h3 {
      font-family: 'Baloo 2', cursive;
      font-size: 22px;
      color: #f3c6ff;
      text-align: center;
      max-width: 600px;
      line-height: 1.6;
      margin-bottom: 20px;
      opacity: 0.9;

      text-shadow:
        1px 1px 5px rgba(0,0,0,0.3);
    }

    #secundaria {
      display: flex;
      flex-direction: column;
      gap: 15px;
      align-items: center;
    }

    .linha {
      display: flex;
      gap: 15px;
    }

    .central {
      justify-content: center;
    }

    .espaco {
      width: 120px;
    }

    .foto {
      width: 120px;
      height: 120px;
      opacity: 0;
      transform: translateY(20px);
      animation: aparecer 0.8s ease forwards;
    }

    .foto:nth-child(1) { animation-delay: 0.1s; }
    .foto:nth-child(2) { animation-delay: 0.2s; }
    .foto:nth-child(3) { animation-delay: 0.3s; }
    .foto:nth-child(4) { animation-delay: 0.4s; }
    .foto:nth-child(5) { animation-delay: 0.5s; }

    .foto img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
      transition: transform 0.3s, filter 0.3s;
    }

    .foto:hover img {
      transform: scale(1.08);
      filter: brightness(1.2);
    }

    .foto:hover {
      box-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
      border-radius: 12px;
    }

    @keyframes aparecer {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    p {
      color: white;
      font-size: 18px;
    }

  </style>
</head>

<body>

  <h1>HAPPY BIRTHDAY !!</h1>

  <h3>
    Você já vai completar 18 anos, mas ainda carrega o mesmo brilho nos olhos da mini Poly.
    E essa surpresa é pra ver esse brilho aparecer.
    Espero que você goste. 💜
  </h3>

  <h3>
    Com carinho, Mari. 💕
  </h3>

  <div id="secundaria">

    <div class="linha">
      <div class="foto"><img src="./1.jpg" alt="foto 1"></div>
      <div class="foto"><img src="./2.jpg" alt="foto 2"></div>

      <div class="espaco"></div>

      <div class="foto"><img src="./3.jpg" alt="foto 3"></div>
      <div class="foto"><img src="./4.jpg" alt="foto 4"></div>
    </div>

    <div class="linha">
      <div class="foto"><img src="./5.jpg" alt="foto 5"></div>
      <div class="foto"><img src="./6.jpg" alt="foto 6"></div>
      <div class="foto"><img src="./7.jpg" alt="foto 7"></div>
      <div class="foto"><img src="./8.jpg" alt="foto 8"></div>
      <div class="foto"><img src="./9.jpg" alt="foto 9"></div>
    </div>

    <div class="linha central">
      <div class="foto"><img src="./10.jpg" alt="foto 10"></div>
      <div class="foto"><img src="./11.jpg" alt="foto 11"></div>
      <div class="foto"><img src="./12.jpg" alt="foto 12"></div>
    </div>

    <div class="linha central">
      <div class="foto"><img src="./13.jpg" alt="foto 13"></div>
      <div class="foto"><img src="./14.jpg" alt="foto 14"></div>
    </div>

    <div class="linha central">
      <div class="foto"><img src="./15.jpg" alt="foto 15"></div>
    </div>

  </div>

  <p>Feliz aniversário meu bem! Eu te amooo 🤍</p>

</body>
</html>
